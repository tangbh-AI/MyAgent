default_model: deepseek-v4-pro
models:
- name: deepseek-v4-pro
  provider: openai_compat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model_id: deepseek-v4-pro
- name: deepseek-v4-flash
  provider: openai_compat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model_id: deepseek-v4-flash
- name: deepseek-v4-pro-anthropic
  provider: anthropic
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/anthropic
  model_id: deepseek-v4-pro
- name: deepseek-v4-flash-anthropic
  provider: anthropic
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/anthropic
  model_id: deepseek-v4-flash
- name: deepseek-r1
  provider: openai_compat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model_id: deepseek-reasoner
- name: glm-4
  provider: openai_compat
  api_key: ${GLM_API_KEY}
  base_url: https://open.bigmodel.cn/api/paas/v4
  model_id: glm-4-flash
- name: glm-4-plus
  provider: openai_compat
  api_key: ${GLM_API_KEY}
  base_url: https://open.bigmodel.cn/api/paas/v4
  model_id: glm-4-plus
- name: qwen-max
  provider: openai_compat
  api_key: ${QWEN_API_KEY}
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model_id: qwen-max
- name: claude-sonnet
  provider: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  model_id: claude-sonnet-4-6
- name: claude-opus
  provider: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  model_id: claude-opus-4-8
abaqus:
  command_path: C:\SIMULIA\Commands\abaqus.bat
  version: 2024
  install_path: C:\SIMULIA\EstProducts\2024
  work_dir: output
cae:
  backend: abaqus
nnw:
  install_path: D:\NNW\NNW-HyFLOW_V1.1_win64_ed
  solver: X64/PHengLEIv3d0.exe
  work_dir: output
simulation:
  default_material: steel
  default_units: mm_N_s
  default_mesh_size: 5.0
  timeout: 3600
